<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200">
  <defs>
    <!-- Gradients -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shadows -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowStrong" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    
    <!-- Styles -->
    <style>
      .title { font: bold 36px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .main { font: bold 20px 'Segoe UI', Arial, sans-serif; fill: #1e293b; }
      .sub { font: 15px 'Segoe UI', Arial, sans-serif; fill: #374151; }
      .highlight { font: bold 15px 'Segoe UI', Arial, sans-serif; fill: #2563eb; }
      .footer { font: 14px 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .takeaway { font: 16px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .takeaway-small { font: 14px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .quote { font: italic 14px 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; }
      .connector { stroke: #cbd5e1; stroke-width: 2.5; fill: none; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1600" height="1200" fill="#ffffff"/>
  
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#f1f5f9" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="1200" fill="url(#grid)"/>
  
  <!-- Central Topic -->
  <ellipse cx="800" cy="80" rx="200" ry="50" fill="url(#mainGrad)" stroke="#1e3a8a" stroke-width="3" filter="url(#shadowStrong)"/>
  <text x="800" y="92" text-anchor="middle" class="title">DATABASES</text>
  
  <!-- Main connector lines -->
  <line x1="800" y1="130" x2="200" y2="240" class="connector"/>
  <line x1="800" y1="130" x2="450" y2="240" class="connector"/>
  <line x1="800" y1="130" x2="800" y2="240" class="connector"/>
  <line x1="800" y1="130" x2="1150" y2="240" class="connector"/>
  <line x1="800" y1="130" x2="1400" y2="240" class="connector"/>
  
  <!-- Branch 1: Definition -->
  <rect x="80" y="240" width="240" height="220" rx="12" fill="#ffffff" stroke="#3b82f6" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="80" y="240" width="240" height="45" rx="12" fill="#eff6ff"/>
  <rect x="80" y="240" width="240" height="45" rx="12" fill="none" stroke="#3b82f6" stroke-width="2.5" clip-path="inset(0 0 50% 0)"/>
  <text x="200" y="272" text-anchor="middle" class="main">1. Definition</text>
  <text x="200" y="310" text-anchor="middle" class="sub">Organized collection</text>
  <text x="200" y="332" text-anchor="middle" class="sub">of data</text>
  <text x="200" y="362" text-anchor="middle" class="sub">Stored electronically</text>
  <text x="200" y="392" text-anchor="middle" class="sub">Efficient storage &amp;</text>
  <text x="200" y="414" text-anchor="middle" class="sub">retrieval</text>
  <text x="200" y="445" text-anchor="middle" class="highlight">→ Digital filing cabinet</text>
  
  <!-- Branch 2: Why Needed -->
  <rect x="330" y="240" width="240" height="220" rx="12" fill="#ffffff" stroke="#10b981" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="330" y="240" width="240" height="45" rx="12" fill="#ecfdf5"/>
  <rect x="330" y="240" width="240" height="45" rx="12" fill="none" stroke="#10b981" stroke-width="2.5" clip-path="inset(0 0 50% 0)"/>
  <text x="450" y="272" text-anchor="middle" class="main">2. Why Needed</text>
  <text x="450" y="310" text-anchor="middle" class="sub">✓ Data Integrity</text>
  <text x="450" y="335" text-anchor="middle" class="sub">✓ Concurrent Access</text>
  <text x="450" y="360" text-anchor="middle" class="sub">✓ Security &amp; Permissions</text>
  <text x="450" y="395" text-anchor="middle" class="sub" font-size="14">Example: Banking,</text>
  <text x="450" y="417" text-anchor="middle" class="sub" font-size="14">E-commerce, Double 11</text>
  <text x="450" y="448" text-anchor="middle" class="highlight" font-size="14">Prevents data loss</text>
  
  <!-- Branch 3: Components (Center) -->
  <rect x="580" y="240" width="240" height="220" rx="12" fill="#ffffff" stroke="#8b5cf6" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="580" y="240" width="240" height="45" rx="12" fill="#f5f3ff"/>
  <rect x="580" y="240" width="240" height="45" rx="12" fill="none" stroke="#8b5cf6" stroke-width="2.5" clip-path="inset(0 0 50% 0)"/>
  <text x="700" y="272" text-anchor="middle" class="main">3. Components</text>
  <text x="700" y="305" text-anchor="middle" class="sub">📊 Tables</text>
  <text x="700" y="327" text-anchor="middle" class="sub">📝 Records / Rows</text>
  <text x="700" y="349" text-anchor="middle" class="sub">📋 Fields / Columns</text>
  <text x="700" y="371" text-anchor="middle" class="sub">🔍 Queries</text>
  <text x="700" y="393" text-anchor="middle" class="sub">📑 Indexes</text>
  <text x="700" y="425" text-anchor="middle" class="highlight" font-size="14">5 Core Elements</text>
  <text x="700" y="448" text-anchor="middle" class="sub" font-size="13">Like Excel tables</text>
  
  <!-- Branch 4: Applications -->
  <rect x="830" y="240" width="240" height="220" rx="12" fill="#ffffff" stroke="#f59e0b" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="830" y="240" width="240" height="45" rx="12" fill="#fffbeb"/>
  <rect x="830" y="240" width="240" height="45" rx="12" fill="none" stroke="#f59e0b" stroke-width="2.5" clip-path="inset(0 0 50% 0)"/>
  <text x="950" y="272" text-anchor="middle" class="main">4. Applications</text>
  <text x="950" y="305" text-anchor="middle" class="sub">📚 Education</text>
  <text x="950" y="327" text-anchor="middle" class="sub">🛒 E-commerce</text>
  <text x="950" y="349" text-anchor="middle" class="sub">💬 Social Media</text>
  <text x="950" y="371" text-anchor="middle" class="sub">🏥 Healthcare</text>
  <text x="950" y="393" text-anchor="middle" class="sub">🏦 Finance</text>
  <text x="950" y="425" text-anchor="middle" class="sub" font-size="13">Grades, Orders, Posts,</text>
  <text x="950" y="447" text-anchor="middle" class="sub" font-size="13">Records, Transactions</text>
  
  <!-- Branch 5: Future -->
  <rect x="1080" y="240" width="240" height="220" rx="12" fill="#ffffff" stroke="#ef4444" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="1080" y="240" width="240" height="45" rx="12" fill="#fef2f2"/>
  <rect x="1080" y="240" width="240" height="45" rx="12" fill="none" stroke="#ef4444" stroke-width="2.5" clip-path="inset(0 0 50% 0)"/>
  <text x="1200" y="272" text-anchor="middle" class="main">5. Future Trends</text>
  <text x="1200" y="310" text-anchor="middle" class="sub">☁️ Cloud Databases</text>
  <text x="1200" y="340" text-anchor="middle" class="sub">⚡ Real-time Processing</text>
  <text x="1200" y="370" text-anchor="middle" class="sub">🤖 AI Integration</text>
  <text x="1200" y="405" text-anchor="middle" class="sub" font-size="13">AWS RDS, Google Cloud</text>
  <text x="1200" y="427" text-anchor="middle" class="sub" font-size="13">SQL, Azure, MongoDB</text>
  <text x="1200" y="458" text-anchor="middle" class="highlight" font-size="14">Auto-optimization</text>
  
  <!-- Separator Line -->
  <line x1="150" y1="520" x2="1450" y2="520" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="10,5"/>
  
  <!-- Bottom Section: Key Takeaways - ENLARGED -->
  <rect x="150" y="560" width="1300" height="350" rx="20" fill="url(#mainGrad)" filter="url(#shadowStrong)"/>
  
  <!-- Title -->
  <text x="800" y="620" text-anchor="middle" class="title" font-size="28">Key Takeaways</text>
  <line x1="250" y1="645" x2="1350" y2="645" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  
  <!-- Left Column -->
  <text x="380" y="700" text-anchor="middle" class="takeaway">✓ Databases organize</text>
  <text x="380" y="730" text-anchor="middle" class="takeaway">&amp; store data efficiently</text>
  
  <text x="380" y="780" text-anchor="middle" class="takeaway">✓ Ensure data integrity</text>
  <text x="380" y="810" text-anchor="middle" class="takeaway">&amp; security</text>
  
  <text x="380" y="860" text-anchor="middle" class="takeaway">✓ 5 core components:</text>
  <text x="380" y="890" text-anchor="middle" class="takeaway-small">Tables, Records, Fields,</text>
  <text x="380" y="915" text-anchor="middle" class="takeaway-small">Queries, Indexes</text>
  
  <!-- Center Column -->
  <text x="800" y="700" text-anchor="middle" class="takeaway">✓ Used in every industry:</text>
  <text x="800" y="735" text-anchor="middle" class="takeaway-small">Education, E-commerce,</text>
  <text x="800" y="760" text-anchor="middle" class="takeaway-small">Social Media, Healthcare,</text>
  <text x="800" y="785" text-anchor="middle" class="takeaway-small">Finance</text>
  
  <text x="800" y="835" text-anchor="middle" class="takeaway">✓ Essential developer skill</text>
  
  <text x="800" y="885" text-anchor="middle" class="takeaway">✓ Evolving with cloud</text>
  <text x="800" y="915" text-anchor="middle" class="takeaway">&amp; AI technology</text>
  
  <!-- Right Column - Quote -->
  <rect x="1120" y="680" width="260" height="210" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="1250" y="725" text-anchor="middle" class="quote" font-size="14">"Databases power</text>
  <text x="1250" y="750" text-anchor="middle" class="quote" font-size="14">the digital world</text>
  <text x="1250" y="775" text-anchor="middle" class="quote" font-size="14">we live in."</text>
  
  <text x="1250" y="825" text-anchor="middle" class="takeaway-small" font-style="italic">Understanding</text>
  <text x="1250" y="850" text-anchor="middle" class="takeaway-small" font-style="italic">databases is the</text>
  <text x="1250" y="875" text-anchor="middle" class="takeaway-small" font-style="italic">first step to</text>
  <text x="1250" y="900" text-anchor="middle" class="takeaway-small" font-style="italic">becoming a great</text>
  <text x="1250" y="925" text-anchor="middle" class="takeaway-small" font-style="italic">developer.</text>
  
  <!-- Footer -->
  <text x="800" y="1170" text-anchor="middle" class="footer">Database Presentation | Freshman Level | 2026</text>
  
  <!-- Decorative elements -->
  <circle cx="120" cy="120" r="80" fill="#2563eb" opacity="0.04"/>
  <circle cx="1480" cy="1080" r="100" fill="#8b5cf6" opacity="0.04"/>
  <circle cx="1450" cy="180" r="50" fill="#10b981" opacity="0.06"/>
  <circle cx="150" cy="1050" r="60" fill="#f59e0b" opacity="0.05"/>
</svg>
